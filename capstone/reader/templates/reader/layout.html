<!doctype html>
{% load static %}
<html>
  <head>
    <title>{% block title %}{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <style>
      .body {
        background-color: #f8f5f1ee;
      }
      .sidebar {
        background-color: #46382a;
        color: rgb(209, 209, 209);
      }
      .sidebar img {
        width: 40px;
        border-radius: 100px;
      }
      .nav-link {
        color: rgb(209, 209, 209);
        padding: 12px 16px;
        transition: all 0.3s ease;
      }
      .nav-link:hover,
      .nav-link:focus,
      .nav-link:active {
        color: white;
        background-color: rgba(248, 245, 241, 0.2);
        border-radius: 15px;
      }
      .sidebar-title {
        font-family: "Pacifico", cursive;
      }
      .search-box {
        width: 500px;
        border: 1px solid #d8d1c8;
        border-radius: 30px;
        overflow: hidden;
        background: #f8f6f3;
      }

      .search-box .input-group-text,
      .search-box .form-control {
        border: none;
        background: transparent;
      }

      .search-box .input-group-text {
        padding-left: 16px;
        color: #8a8175;
      }

      .search-box .form-control {
        padding: 12px 16px 12px 8px;
        font-size: 15px;
      }

      .search-box .form-control:focus {
        box-shadow: none;
        background: transparent;
      }

      .search-box .form-control::placeholder {
        color: #8a8175;
      }
    </style>
    {% block style %} {% endblock %}
  </head>
  <body class="m-0">
    <div class="container-fluid">
      <!-- Mobile Sidebar -->
      <div class="d-lg-none d-flex align-items-center p-2">
        <button
          class="btn btn-dark"
          data-bs-toggle="offcanvas"
          data-bs-target="#mobileSidebar"
        >
          <i class="bi bi-list"></i>
        </button>
        <h4 class="sidebar-title ms-3 mb-0">Vivid Ink</h4>
        <div
          class="offcanvas offcanvas-start sidebar"
          tabindex="-1"
          id="mobileSidebar"
        >
          <div class="offcanvas-header">
            <img
              src="{% static 'reader/vividink.png' %}"
              alt="Vivid Ink Logo"
            />
            <h4 class="sidebar-title ms-3 mb-0">Vivid Ink</h4>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="offcanvas"
            ></button>
          </div>
          <div class="offcanvas-body">
            {% include "reader/sidebarMenu.html" %}
          </div>
        </div>
      </div>
      <!-- Desktop Sidebar-->
      <div class="row">
        {% include "reader/sidebar.html" %}
        <div class="col-12 col-lg-10 body vh-100">
          <!--Body of the page-->
          {% block body %} {% endblock %}
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
